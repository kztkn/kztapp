<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#1e0645"/>
      <stop offset="100%" stop-color="#060010"/>
    </radialGradient>
    <linearGradient id="kg" x1="0" y1="80" x2="0" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="20%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" color-interpolation-filters="sRGB" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- ambient glow: blurred K behind -->
    <g filter="url(#ambient)" opacity="0.5">
      <rect x="90" y="80" width="85" height="352" fill="url(#kg)"/>
      <rect x="147" y="125.5" width="303" height="85"
            transform="rotate(-35.5, 298.5, 168)" fill="url(#kg)"/>
      <rect x="147" y="301.5" width="303" height="85"
            transform="rotate(35.5, 298.5, 344)" fill="url(#kg)"/>
    </g>

    <!-- K shape -->
    <g filter="url(#glow)">
      <rect x="90" y="80" width="85" height="352" rx="10" fill="url(#kg)"/>
      <rect x="147" y="125.5" width="303" height="85" rx="10"
            transform="rotate(-35.5, 298.5, 168)" fill="url(#kg)"/>
      <rect x="147" y="301.5" width="303" height="85" rx="10"
            transform="rotate(35.5, 298.5, 344)" fill="url(#kg)"/>
    </g>
  </g>
</svg>
